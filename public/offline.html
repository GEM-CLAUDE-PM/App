<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GEM PM Pro — Offline</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      display: flex; align-items: center; justify-content: center;
      color: white; padding: 24px;
    }
    .card {
      text-align: center; max-width: 360px; width: 100%;
    }
    .icon {
      width: 80px; height: 80px;
      background: rgba(139,92,246,0.2);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin: 0 auto 24px;
      border: 1px solid rgba(139,92,246,0.3);
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    p  { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 28px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 999px; font-size: 12px; font-weight: 600;
      color: #fbbf24; margin-bottom: 28px;
    }
    .dot { width:7px; height:7px; border-radius:50%; background:#fbbf24; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white; font-weight: 700; font-size: 15px;
      border: none; border-radius: 16px; cursor: pointer;
      margin-bottom: 12px; transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .features {
      margin-top: 28px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 16px;
      text-align: left;
    }
    .features p { font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #64748b; margin-bottom: 10px; }
    .feature-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: #cbd5e1; padding: 5px 0;
    }
    .feature-item span:first-child { font-size: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✨</div>
    <h1>Không có kết nối mạng</h1>
    <p>GEM PM Pro đang ở chế độ offline.<br/>
    Một số tính năng vẫn hoạt động bình thường.</p>

    <div class="badge">
      <span class="dot"></span>
      Đang chờ kết nối lại...
    </div>

    <button class="btn" onclick="window.location.reload()">
      🔄 Thử lại
    </button>
    <button class="btn btn-secondary" onclick="window.history.back()">
      ← Quay lại
    </button>

    <div class="features">
      <p>Khả dụng khi offline</p>
      <div class="feature-item"><span>📋</span> Xem nhật ký đã tải</div>
      <div class="feature-item"><span>✅</span> Checklist HSE đã cache</div>
      <div class="feature-item"><span>📊</span> Dữ liệu BOQ đã lưu</div>
      <div class="feature-item"><span>✏️</span> Nhập liệu — đồng bộ khi có mạng</div>
    </div>
  </div>

  <script>
    // Auto-reload when back online
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
